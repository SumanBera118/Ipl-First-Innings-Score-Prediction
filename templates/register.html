<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL Register</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?auto=format&fit=crop&w=1400&q=80');
background-size:cover;
background-position:center;
padding:20px;
}

.card{
width:460px;
padding:38px 34px;
border-radius:24px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.18);
box-shadow:0 20px 40px rgba(0,0,0,.35);
color:white;
}

.logo{
font-size:46px;
text-align:center;
margin-bottom:8px;
}

h2{
text-align:center;
font-size:28px;
margin-bottom:8px;
}

.sub{
text-align:center;
font-size:14px;
opacity:.85;
margin-bottom:22px;
}

.input-box{
margin-bottom:14px;
}

.input-box label{
display:block;
margin-bottom:6px;
font-size:14px;
font-weight:500;
}

.input-box input,
.input-box select{
width:100%;
padding:13px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.14);
color:white;
font-size:14px;
}

.input-box input::placeholder{
color:#ddd;
}

.input-box select option{
color:black;
}

.input-box input:focus,
.input-box select:focus{
box-shadow:0 0 0 2px #00c6ff;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
margin-top:8px;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,114,255,.35);
}

.error{
background:rgba(255,0,0,.18);
padding:10px;
border-radius:10px;
margin-bottom:14px;
font-size:14px;
text-align:center;
}

.link{
text-align:center;
margin-top:18px;
font-size:14px;
}

.link a{
color:#fff;
font-weight:600;
text-decoration:none;
border-bottom:1px solid rgba(255,255,255,.5);
}
</style>
</head>
<body>

<div class="card">

<div class="logo">🏏</div>
<h2>Create Account</h2>
<p class="sub">Register to use IPL Predictor</p>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form action="/register" method="POST">

<!-- <div class="input-box">
<label>Full Name</label>
<input type="text" name="fullname" placeholder="Enter full name" required>
</div> -->

<div class="input-box">
<label>Username</label>
<input type="text" name="username" placeholder="Choose username" required>
</div>

<div class="input-box">
<label>Email</label>
<input type="email" name="email" placeholder="Enter Gmail address" required>
</div>

<div class="input-box">
<label>Password</label>
<input type="password" name="password" placeholder="Create password" required>
</div>

<div class="input-box">
<label>Confirm Password</label>
<input type="password" name="confirm_password" placeholder="Confirm password" required>
</div>

<!-- <div class="input-box">
<label>Favourite Team</label>
<select name="fav_team" required>
<option value="">Select Team</option>
<option>CSK</option>
<option>MI</option>
<option>RCB</option>
<option>KKR</option>
<option>SRH</option>
<option>RR</option>
<option>DC</option>
<option>PBKS</option>
<option>GT</option>
<option>LSG</option>
</select>
</div> -->

<button type="submit" class="btn">Register Now</button>

</form>

<div class="link">
Already have account? <a href="/login">Login</a>
</div>

</div>

</body>
</html>
