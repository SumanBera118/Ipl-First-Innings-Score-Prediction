VERIFY_OTP.HTML
========================= -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?auto=format&fit=crop&w=1400&q=80');
background-size:cover;
background-position:center;
padding:20px;
}

.card{
width:420px;
padding:40px 34px;
border-radius:24px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.18);
box-shadow:0 20px 40px rgba(0,0,0,.35);
color:white;
text-align:center;
}

.logo{
font-size:48px;
margin-bottom:10px;
}

h2{
font-size:28px;
margin-bottom:8px;
}

.sub{
font-size:14px;
opacity:.85;
margin-bottom:22px;
line-height:1.5;
}

.input-box{
margin-bottom:16px;
}

.input-box input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.14);
color:white;
font-size:20px;
text-align:center;
letter-spacing:6px;
}

.input-box input::placeholder{
color:#ddd;
letter-spacing:1px;
font-size:15px;
}

.input-box input:focus{
box-shadow:0 0 0 2px #00c6ff;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,114,255,.35);
}

.error{
background:rgba(255,0,0,.18);
padding:10px;
border-radius:10px;
margin-bottom:14px;
font-size:14px;
}

.link{
margin-top:18px;
font-size:14px;
}

.link a{
color:#fff;
font-weight:600;
text-decoration:none;
border-bottom:1px solid rgba(255,255,255,.5);
}
</style>
</head>
<body>

<div class="card">

<div class="logo">📩</div>
<h2>OTP Verification</h2>
<p class="sub">Enter the 6-digit code sent to your Gmail account</p>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST">

<div class="input-box">
<input type="text" name="otp" maxlength="6" placeholder="Enter OTP" required>
</div>

<button type="submit" class="btn">Verify OTP</button>

</form>

<div class="link">
Didn't receive code? <a href="/login">Resend OTP</a>
</div>

</div>

</body>
</html>
